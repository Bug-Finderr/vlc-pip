name: ci

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  helper:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unit tests
        run: cargo test --manifest-path helper/Cargo.toml
      - name: Clippy
        run: cargo clippy --manifest-path helper/Cargo.toml --all-targets -- -D warnings
      # install.ps1 runs exactly this on user machines, and the size-tuned profile
      # (lto, panic=abort, strip) is never otherwise compiled
      - name: Release build
        run: cargo build --release --manifest-path helper/Cargo.toml
