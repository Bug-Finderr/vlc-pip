name: Close PRs

on:
  pull_request_target:
    branches: [master]

# never checks out PR code; token scoped to the two perms gh pr close --comment needs
permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Close external PRs
        # exact match on the PR AUTHOR (not github.actor: that's whoever triggered the
        # event, and substring contains() would also pass e.g. a user named "Bug")
        if: ${{ github.event.pull_request.user.login != 'Bug-Finderr' }}
        run: gh pr close ${{ github.event.number }} --comment "This repo does not accept external PRs. Please open an issue instead." --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
