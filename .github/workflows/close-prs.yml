name: Close PRs

on: pull_request_target

jobs:
  close:
    runs-on: ubuntu-latest
    env:
      ALLOWED_USERS: Bug-Finderr
    steps:
      - name: Close if not allowed
        if: ${{ !contains(env.ALLOWED_USERS, github.actor) }}
        run: gh pr close ${{ github.event.number }} --comment "This repo does not accept external PRs. Please open an issue instead." --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
